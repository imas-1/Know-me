function playTone(freq, duration = 0.15, type = "sine") {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.connect(gain).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}

function normText(s) { return (s || "").toString().trim().toLowerCase(); }
function fuzzyMatch(a, b) {
  const na = normText(a), nb = normText(b);
  if (!na || !nb) return false;
  if (na === nb) return true;
  return na.includes(nb) || nb.includes(na);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
const DURATIONS = { scurt: 8, mediu: 16, lung: QUESTION_BANK.length };
function pickQuestions(duration) {
  const count = DURATIONS[duration] || 8;
  // group by round, take round-robin so the mix of round types stays varied
  const byRound = {};
  QUESTION_BANK.forEach((q) => { (byRound[q.round] ||= []).push(q); });
  Object.keys(byRound).forEach((r) => { byRound[r] = shuffle(byRound[r]); });
  const rounds = shuffle(Object.keys(byRound));
  const picked = [];
  let i = 0;
  while (picked.length < count) {
    let addedAny = false;
    for (const r of rounds) {
      if (byRound[r][i]) { picked.push(byRound[r][i]); addedAny = true; }
      if (picked.length >= count) break;
    }
    if (!addedAny) break;
    i++;
  }
  return shuffle(picked).slice(0, count);
}

function App() {

  useEffect(() => {
    function onFbReady() {
      const fb = window.__fb;
      fb.onAuthStateChanged(fb.auth, (u) => { if (u) { setUid(u.uid); setReady(true); } });
      fb.signInAnonymously(fb.auth).catch((err) => showError("Autentificare eșuată: " + (err.code || "") + " " + (err.message || err)));
    }
    if (window.__fb) onFbReady(); else window.addEventListener("fb-ready", onFbReady);
  }, []);

  // Listen to room + players once we have a roomCode
  useEffect(() => {
    if (!roomCode) return;
    const fb = window.__fb;
    const unsubRoom = fb.onSnapshot(fb.doc(fb.db, "rooms", roomCode), (snap) => {
      if (!snap.exists()) return;
      setRoom(snap.data());
      if (snap.data().finalResults) { setResults(snap.data().finalResults); setHighlights(snap.data().highlights || []); setScreen("results"); }
    });
    const unsubPlayers = fb.onSnapshot(fb.collection(fb.db, "rooms", roomCode, "players"), (snap) => {
      setPlayers(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
    });
    return () => { unsubRoom(); unsubPlayers(); };
  }, [roomCode]);

  async function createGame(chosenQuestions, answersByIndex) {
    const fb = window.__fb;
    const gameRef = await fb.addDoc(fb.collection(fb.db, "games"), { hostId: uid, hostName, questionCount: chosenQuestions.length, createdAt: fb.serverTimestamp(), status: "ready" });
    const built = chosenQuestions.map((q, i) => {
      if (q.type === "vote") return { ...q, hostAnswer: "WINNER", order: i };
      if (q.type === "fake") {
        const a = answersByIndex[i] || {};
        return { ...q, hostAnswer: a.real || "", fakeOptions: a.fakes || ["", "", ""], order: i };
      }
      if (q.type === "timeline") {
        const order = answersByIndex[i] || [];
        return { ...q, hostAnswer: JSON.stringify(order), order: i };
      }
      return { ...q, hostAnswer: answersByIndex[i] || "", order: i };
    });
    for (const q of built) {
      await fb.addDoc(fb.collection(fb.db, "games", gameRef.id, "questions"), q);
    }
    setGameId(gameRef.id);
    setQuestions(built);
    return gameRef.id;
  }

  async function createRoom(gId, hostNameOverride) {
    const fb = window.__fb;
    try {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      const code = Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join("");
      await fb.setDoc(fb.doc(fb.db, "rooms", code), {
        hostId: uid, hostName: hostNameOverride || hostName, gameId: gId, status: "lobby",
        currentQuestionIndex: 0, revealed: false, createdAt: fb.serverTimestamp(),
      });
      setRoomCode(code); setIsHost(true); setScreen("lobby");
    } catch (err) {
      showError("Creare cameră eșuată: " + (err.message || err));
    }
  }

  async function joinRoom(code, name) {
    const fb = window.__fb;
    const roomSnap = await fb.getDoc(fb.doc(fb.db, "rooms", code));
    if (!roomSnap.exists()) { throw new Error("Cod invalid — verifică și încearcă din nou."); }
    await fb.addDoc(fb.collection(fb.db, "rooms", code, "players"), { name, uid, joinedAt: fb.serverTimestamp(), score: 0 });
    const gSnap = roomSnap.data();
    const qSnap = await fb.getDocs(fb.query(fb.collection(fb.db, "games", gSnap.gameId, "questions"), fb.orderBy("order")));
    setQuestions(qSnap.docs.map((d) => d.data()));
    setRoomCode(code); setIsHost(false); setScreen("lobby");
  }

  async function submitGuess(guess) {
    const fb = window.__fb;

      await fb.addDoc(fb.collection(fb.db, "rooms", roomCode, "answers"), {

    const fb = window.__fb;
    try {
      await fb.addDoc(fb.collection(fb.db, "rooms", roomCode, "answers"), {
        playerId: winnerUid, guess: "WINNER", roundIndex: room.currentQuestionIndex, answeredAt: fb.serverTimestamp(),
      });
    } catch (err) {
      showError("Vot eșuat: " + (err.message || err));
    }
  }

  async function revealAnswer() {
    const fb = window.__fb;
    try {
      await fb.updateDoc(fb.doc(fb.db, "rooms", roomCode), { revealed: true });
      sfx.cheer();
    } catch (err) {
      showError("Reveal eșuat: " + (err.message || err));
    }
  }

  async function nextQuestion() {
    const fb = window.__fb;
    try {
      const next = (room.currentQuestionIndex || 0) + 1;
      if (next >= questions.length) { await finishGame(); return; }
      await fb.updateDoc(fb.doc(fb.db, "rooms", roomCode), { currentQuestionIndex: next, revealed: false });
    } catch (err) {
      showError("Avansare rundă eșuată: " + (err.message || err));
    }
  }

  async function savePrediction(name) {
    const fb = window.__fb;
    try {
      await fb.updateDoc(fb.doc(fb.db, "rooms", roomCode), { prediction: name });
    } catch (err) {
      showError("Salvare predicție eșuată: " + (err.message || err));
    }
  }

  async function finishGame() {
    const fb = window.__fb;
    const [playersSnap, answersSnap] = await Promise.all([
      fb.getDocs(fb.collection(fb.db, "rooms", roomCode, "players")),
      fb.getDocs(fb.collection(fb.db, "rooms", roomCode, "answers")),
    ]);
    const pl = playersSnap.docs.map((d) => d.data());
    const ans = answersSnap.docs.map((d) => d.data());
    const computed = pl.map((p) => {
      const mine = ans.filter((a) => a.playerId === p.uid);
      let correct = 0;
      mine.forEach((a) => { const q = questions[a.roundIndex]; if (q && fuzzyMatch(q.hostAnswer, a.guess)) correct += 1; });
      const total = questions.length || 1;
      const pct = Math.round((correct / total) * 100);
      return { name: p.name, correct, total, pct, title: titleFor(pct) };
    }).sort((a, b) => b.pct - a.pct);

    const playerByUid = {}; pl.forEach((p) => { playerByUid[p.uid] = p.name; });
    const textAnswers = ans
      .filter((a) => { const q = questions[a.roundIndex]; return q && (q.type === "text" || q.type === "fake") && a.guess && a.guess.trim().length > 1; })
      .map((a) => ({ name: playerByUid[a.playerId] || "?", prompt: questions[a.roundIndex].prompt, guess: a.guess }));
    const highlights = shuffle(textAnswers).slice(0, 3);

    await fb.updateDoc(fb.doc(fb.db, "rooms", roomCode), { finalResults: computed, highlights, status: "finished" });
    setResults(computed); setHighlights(highlights); setScreen("results"); sfx.cheer();
  }

  useEffect(() => {
    if (room && room.status === "playing" && screen === "lobby") setScreen("play");
  }, [room, screen]);

  if (!ready) return <div className="min-h-screen flex items-center justify-center text-white/50 text-sm">Conectare la Firebase...</div>;

  return (
    <div className="min-h-screen flex justify-center py-6 px-4">
      <div className="w-full max-w-md">
        {screen === "home" && <HomeScreen onCreate={() => setScreen("hostname")} onJoin={() => setScreen("join")} onMyGames={() => setScreen("mygames")} />}
        {screen === "hostname" && <HostNameScreen value={hostName} onBack={() => setScreen("home")} onNext={(name) => { setHostName(name); setScreen("duration"); }} />}
        {screen === "duration" && <DurationScreen onBack={() => setScreen("hostname")} onPick={(key) => { setChosenQuestions(pickQuestions(key).map(q => ({ ...q, prompt: fillName(q.prompt, hostName) }))); setScreen("create"); }} />}
        {screen === "create" && <CreateGameScreen questions={chosenQuestions} onEditPrompt={(i, text) => setChosenQuestions(prev => prev.map((qq, idx) => idx === i ? { ...qq, prompt: text } : qq))} onDone={async (answers) => { await createGame(chosenQuestions, answers); setScreen("gameready"); }} onBack={() => setScreen("duration")} />}
        {screen === "gameready" && <GameReadyScreen hostName={hostName} onStartNow={async () => { setScreen("starting"); await createRoom(gameId); }} onHome={() => setScreen("home")} />}
        {screen === "starting" && <div className="min-h-[600px] flex items-center justify-center text-white/50 text-sm">Se pornește camera...</div>}
        {screen === "mygames" && <MyGamesScreen uid={uid} onBack={() => setScreen("home")} onPick={async (g) => {
          const fb = window.__fb;
          const qSnap = await fb.getDocs(fb.query(fb.collection(fb.db, "games", g.id, "questions"), fb.orderBy("order")));
          setQuestions(qSnap.docs.map((d) => d.data()));
          setGameId(g.id); setHostName(g.hostName || hostName);
          setScreen("starting"); await createRoom(g.id, g.hostName);
        }} />}
        {screen === "join" && <JoinScreen onBack={() => setScreen("home")} onJoin={joinRoom} />}
        {screen === "lobby" && <LobbyScreen room={room} roomCode={roomCode} players={players} isHost={isHost} onPredict={savePrediction} onStart={async () => { const fb = window.__fb; await fb.updateDoc(fb.doc(fb.db,"rooms",roomCode), {status:"playing"}); }} />}
        {screen === "play" && <PlayScreen room={room} questions={questions} isHost={isHost} players={players} onGuess={submitGuess} onVote={submitVote} onReveal={revealAnswer} onNext={nextQuestion} />}
        {screen === "results" && <ResultsScreen results={results} hostName={hostName} prediction={room?.prediction} highlights={highlights} />}
      </div>
    </div>
  );
}

function CreateGameScreen({ questions, onEditPrompt, onDone, onBack }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const q = questions[step];
  const isLast = step === questions.length - 1;
  const [busy, setBusy] = useState(false);
  const [errMsg, setErrMsg] = useState("");
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState("");

  function isStepValid() {
    if (q.type === "vote") return true;
    const a = answers[step];
    if (q.type === "text") return !!(a && a.trim());
    if (q.type === "choice") return !!a;
    if (q.type === "timeline") return !!(a && a.length === q.items.length);
    if (q.type === "fake") return !!(a && a.real && a.real.trim() && a.fakes && a.fakes.every(f => f && f.trim()));
    return true;
  }

  return (
    <div className="relative min-h-[600px] px-4 py-6">
      <button onClick={onBack} className="text-white/40 text-sm mb-6">← înapoi</button>
      <div className="h-1.5 rounded-full bg-white/10 overflow-hidden mb-6">
        <div className="h-full bg-gradient-to-r from-amber-300 to-pink-400 transition-all" style={{ width: `${((step+1)/questions.length)*100}%` }} />
      </div>
      <div className="flex items-center justify-between">
        <p className="text-xs uppercase tracking-widest" style={{color: (ROUND_COLORS[q.round]||{}).text || "#f9a8d4"}}>{q.icon} {q.round}</p>
        <button onClick={()=>{ setDraft(q.prompt); setEditing(!editing); }} className="text-white/30 text-xs">✏️ {editing ? "renunță" : "rescrie"}</button>
      </div>
      {editing ? (
        <div className="mt-2 mb-5">
          <textarea rows={2} value={draft} onChange={(e)=>setDraft(e.target.value)}
            className="w-full rounded-2xl border border-amber-300/40 bg-amber-300/[0.06] px-4 py-3 text-white outline-none focus:border-amber-300/70 resize-none display text-xl" />
          <button onClick={()=>{ onEditPrompt(step, draft || q.prompt); setEditing(false); }} className="mt-2 text-amber-300 text-sm">Salvează întrebarea</button>
        </div>
      ) : (
        <h2 className="display text-2xl mt-2 mb-5">{q.prompt}</h2>
      )}
      {q.type === "text" ? (
        <textarea rows={4} value={answers[step]||""} onChange={(e)=>setAnswers({...answers,[step]:e.target.value})}
          className="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-white outline-none focus:border-amber-300/50 resize-none" placeholder="Răspunsul tău..." />
      ) : q.type === "choice" ? (
        <div className="flex flex-col gap-3">
          {q.options.map(opt => (
            <button key={opt} onClick={()=>setAnswers({...answers,[step]:opt})}
              className={`rounded-2xl border px-5 py-3.5 text-left ${answers[step]===opt ? "border-amber-300/60 bg-amber-300/10 text-amber-200":"border-white/10 bg-white/[0.04] text-white/85"}`}>{opt}</button>
          ))}
        </div>
      ) : q.type === "timeline" ? (
        <TimelineOrderPicker items={q.items} value={answers[step]||[]} onChange={(order)=>setAnswers({...answers,[step]:order})} />
      ) : q.type === "fake" ? (
        <div className="flex flex-col gap-2.5">
          <p className="text-white/40 text-xs">Răspunsul real:</p>
          <input value={(answers[step]||{}).real||""} onChange={(e)=>setAnswers({...answers,[step]:{...(answers[step]||{}), real:e.target.value}})}
            className="w-full rounded-2xl border border-emerald-400/30 bg-emerald-400/[0.06] px-4 py-3 text-white outline-none focus:border-emerald-400/60" placeholder="Răspunsul adevărat..." />
          <p className="text-white/40 text-xs mt-2">3 răspunsuri false (credibile):</p>
          {[0,1,2].map(fi => (
            <input key={fi} value={((answers[step]||{}).fakes||["","",""])[fi]||""}
              onChange={(e)=>{
                const cur = answers[step]||{};
                const fakes = [...(cur.fakes||["","",""])];
                fakes[fi] = e.target.value;
                setAnswers({...answers,[step]:{...cur, fakes}});
              }}
              className="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-white outline-none focus:border-amber-300/50" placeholder={`Răspuns fals ${fi+1}...`} />
          ))}
        </div>
      ) : (
        <p className="text-white/40 text-sm rounded-2xl border border-dashed border-white/10 px-4 py-6 text-center">
          🎬 Această probă se votează live la petrecere — nu ai nimic de completat acum.
        </p>
      )}
      <div className="flex gap-3 mt-6">
        {step>0 && <Ghost onClick={()=>setStep(step-1)}>Înapoi</Ghost>}
        <Primary disabled={busy || !isStepValid()} onClick={async ()=>{
          if (isLast) {
            setBusy(true); setErrMsg("");
            try { await onDone(answers); }
            catch (err) { setErrMsg("Eroare la creare joc: " + (err.message || err)); setBusy(false); }
          } else setStep(step+1);
        }}>{busy ? "Se creează..." : isLast ? "Generează jocul" : "Următoarea"}</Primary>
      </div>
      {!isStepValid() && !busy && <p className="text-white/30 text-xs mt-2 text-center">Completează răspunsul ca să continui.</p>}
      {errMsg && <p className="text-rose-300 text-xs mt-2 text-center">{errMsg}</p>}
    </div>
  );
}

function PlayScreen({ room, questions, isHost, players, onGuess, onVote, onReveal, onNext }) {
  const idx = room?.currentQuestionIndex || 0;
  const q = questions[idx];
  const [guess, setGuess] = useState("");
  const [voted, setVoted] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [hostBusy, setHostBusy] = useState(false);
  const [phase, setPhase] = useState("answering");
  const [countStep, setCountStep] = useState(0);
  const COUNT = ["🥁","3","2","1","💥"];

  useEffect(() => { setPhase("answering"); setGuess(""); setVoted(null); setSubmitted(false); setHostBusy(false); }, [idx]);
  useEffect(() => {
    if (room?.revealed) { setPhase("countdown"); setCountStep(0);
      let s=0; const t=setInterval(()=>{ s++; if(s<COUNT.length){setCountStep(s); sfx.drum();} else {clearInterval(t); setPhase("revealed"); sfx.cheer();} },380);
      return ()=>clearInterval(t);
    }
  }, [room?.revealed]);

  const fakeOpts = useMemo(() => {
    if (!q || q.type !== "fake") return null;
    const all = [q.hostAnswer, ...(q.fakeOptions || [])].filter(Boolean);
    return shuffle(all);
  }, [q]);
  const timelineItems = useMemo(() => (q && q.type === "timeline") ? shuffle(q.items) : null, [q]);
  const [timelineOrder, setTimelineOrder] = useState([]);
  useEffect(() => { setTimelineOrder([]); }, [idx]);

  if (!q) return <div className="p-8 text-center text-white/50">Se încarcă întrebarea...</div>;

  return (
    <div className="relative min-h-[600px] px-4 py-6">
      <p className="text-xs uppercase tracking-widest font-semibold" style={{color: (ROUND_COLORS[q.round]||{}).text || "#f9a8d4"}}>{q.icon} {q.round} · întrebarea {idx+1}/{questions.length}</p>
      <h2 className="display text-2xl mt-2 mb-6">{q.prompt}</h2>

      {phase !== "revealed" && q.type === "vote" && (
        isHost ? (
          <div className="flex flex-col gap-3">
            <p className="text-white/40 text-sm mb-1">Alege cine a avut cea mai bună interpretare:</p>
            {(players||[]).map(p=>(
              <button key={p.id} onClick={()=>{ setVoted(p.uid); onVote(p.uid); }}
                className={`rounded-2xl border px-5 py-3.5 text-left ${voted===p.uid?"border-amber-300/60 bg-amber-300/10 text-amber-200":"border-white/10 bg-white/[0.04]"}`}>
                {p.name} {voted===p.uid && "🏆"}
              </button>
            ))}
          </div>
        ) : (
          <p className="text-white/40 text-sm rounded-2xl border border-dashed border-white/10 px-4 py-8 text-center">
            🎭 Fă-ți numărul acum — hostul votează cine câștigă runda!
          </p>
        )
      )}

      {phase !== "revealed" && q.type === "timeline" && (
        isHost ? (
          <p className="text-white/40 text-sm rounded-2xl border border-dashed border-white/10 px-4 py-8 text-center">
            📅 Tu ai stabilit deja ordinea reală — jucătorii ghicesc acum.
          </p>
        ) : (
          <TimelineOrderPicker items={timelineItems} value={timelineOrder} onChange={(order) => {
            setTimelineOrder(order);
            if (order.length === timelineItems.length) onGuess(JSON.stringify(order));
          }} />
        )
      )}

      {phase !== "revealed" && q.type === "fake" && (
        isHost ? (
          <p className="text-white/40 text-sm rounded-2xl border border-dashed border-white/10 px-4 py-8 text-center">
            🎲 Tu ai completat deja răspunsul real — jucătorii aleg acum din cele 4 variante.
          </p>
        ) : (
          <div className="flex flex-col gap-3">
            {fakeOpts.map(opt=>(
              <button key={opt} onClick={()=>{setGuess(opt); onGuess(opt);}} style={guess===opt ? {borderColor:(ROUND_COLORS[q.round]||{}).border, background:(ROUND_COLORS[q.round]||{}).bg, color:(ROUND_COLORS[q.round]||{}).text} : {}} className={`rounded-2xl border px-5 py-3.5 text-left ${guess===opt?"":"border-white/10 bg-white/[0.04]"}`}>{opt}</button>
            ))}
          </div>
        )
      )}

      {phase !== "revealed" && q.type !== "vote" && q.type !== "fake" && q.type !== "timeline" && (
        isHost ? (
          <p className="text-white/40 text-sm rounded-2xl border border-dashed border-white/10 px-4 py-8 text-center">
            ✅ Tu ai completat deja răspunsul — jucătorii ghicesc acum.
          </p>
        ) : q.type === "choice" ? (
          <div className="flex flex-col gap-3">
            {q.options.map(opt=>(<button key={opt} onClick={()=>{setGuess(opt); onGuess(opt);}} style={guess===opt ? {borderColor:(ROUND_COLORS[q.round]||{}).border, background:(ROUND_COLORS[q.round]||{}).bg, color:(ROUND_COLORS[q.round]||{}).text} : {}} className={`rounded-2xl border px-5 py-3.5 text-left ${guess===opt?"":"border-white/10 bg-white/[0.04]"}`}>{opt}</button>))}
          </div>
        ) : (
          <div className="flex gap-2">
            <Input value={guess} onChange={(e)=>setGuess(e.target.value)} placeholder="Ghicește..." className="mb-0" disabled={submitted} />
            <button
              onClick={()=>{ if(!guess.trim()) return; onGuess(guess); setSubmitted(true); }}
              disabled={submitted}
              className={`rounded-2xl font-bold px-4 ${submitted ? "bg-emerald-400/20 text-emerald-300 border border-emerald-400/40" : "bg-amber-300 text-[#241531]"}`}
            >
              {submitted ? "✓ Trimis" : "✓"}
            </button>
          </div>
        )
      )}

      {phase === "revealed" && (
        <div className="rounded-2xl border border-emerald-400/40 bg-emerald-400/10 p-4 text-emerald-300 pop-anim">
          {q.type === "vote" ? "🏆 Câștigătorul rundei a fost votat!" :
           q.type === "timeline" ? (
             <div>
               <p className="mb-2">✔️ Ordinea reală:</p>
               <ol className="list-decimal list-inside space-y-1">
                 {(() => { try { return JSON.parse(q.hostAnswer); } catch(e) { return []; } })().map((it) => (<li key={it}>{it}</li>))}
               </ol>
             </div>
           ) : <>✔️ Răspunsul real: <b>{q.hostAnswer}</b></>}
        </div>
      )}

      {phase === "countdown" && (
        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#180F28]/90">
          <div key={countStep} className="pop-anim display text-7xl text-amber-300">{COUNT[countStep]}</div>
        </div>
      )}

      {isHost && (
        <div className="flex flex-col gap-2 mt-8">
          <div className="flex gap-3">
            <Ghost onClick={async ()=>{ setHostBusy(true); await onReveal(); setHostBusy(false); }} className={hostBusy?"opacity-40 pointer-events-none":""}>Arată răspunsul</Ghost>
            <Primary onClick={async ()=>{ setHostBusy(true); await onNext(); setHostBusy(false); }} className={hostBusy?"opacity-40 pointer-events-none":""}>{idx>=questions.length-1 ? "Finalizează jocul" : "Următoarea"}</Primary>
          </div>
          {hostBusy && <p className="text-center text-white/30 text-xs">se sincronizează cu jucătorii...</p>}
        </div>
      )}
    </div>
  );
}

/* ---------- Recap video generator (canvas + MediaRecorder, runs fully client-side) ---------- */
function spawnConfetti(particles, W, H, count) {
  const colors = ["#fcd34d", "#f472b6", "#60a5fa", "#4ade80", "#fb923c"];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * W, y: -20 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 2, vy: 2 + Math.random() * 3,
      size: 6 + Math.random() * 6, color: colors[i % colors.length],
      rot: Math.random() * 360, vr: (Math.random() - 0.5) * 10,
    });
  }
}
function updateAndDrawConfetti(ctx, particles, W, H, dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.rot += p.vr;
    if (p.y > H + 30) { particles.splice(i, 1); continue; }
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate((p.rot * Math.PI) / 180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.66);
    ctx.restore();
  }
}
function drawBg(ctx, W, H) {
  const g = ctx.createRadialGradient(W / 2, H * 0.25, 60, W / 2, H * 0.25, W * 0.9);
  g.addColorStop(0, "#2a1f45"); g.addColorStop(1, "#180F28");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}
function wrapCenterText(ctx, text, cx, cy, maxWidth, lineHeight) {
  const words = text.split(" "); let line = ""; const lines = [];
  words.forEach((w) => {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; } else line = test;
  });
  if (line) lines.push(line);
  const startY = cy - ((lines.length - 1) * lineHeight) / 2;
  lines.forEach((l, i) => ctx.fillText(l, cx, startY + i * lineHeight));
}
function easeOutBack(t) { const c = 1.70158; return 1 + (c + 1) * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2); }
function clamp01(x) { return Math.max(0, Math.min(1, x)); }

const RECAP_SCENES = { intro: [0, 3], winner: [3, 8.5], funny: [8.5, 13.5], awards: [13.5, 19], meter: [19, 24], outro: [24, 26.5] };

function drawRecapFrame(ctx, W, H, t, results, hostName, particles, highlights) {
  const SCENES = RECAP_SCENES;
  drawBg(ctx, W, H);
  ctx.textAlign = "center";

  if (t >= SCENES.intro[0] && t < SCENES.intro[1]) {
    const local = t - SCENES.intro[0];
    const scale = easeOutBack(clamp01(local / 0.6));
    ctx.save(); ctx.translate(W / 2, H * 0.42); ctx.scale(scale, scale);
    ctx.font = "120px sans-serif"; ctx.fillText("🎉", 0, 0);
    ctx.restore();
    ctx.fillStyle = "#ffffff"; ctx.font = "700 56px Georgia, serif";
    ctx.fillText("Know Me", W / 2, H * 0.56);
    ctx.fillStyle = "#fcd34d"; ctx.font = "600 30px sans-serif";
    ctx.fillText(hostName || "", W / 2, H * 0.62);
  } else if (t >= SCENES.winner[0] && t < SCENES.winner[1]) {
    if (Math.abs(t - SCENES.winner[0]) < 0.05) spawnConfetti(particles, W, H, 60);
    const local = t - SCENES.winner[0];
    const scale = easeOutBack(clamp01(local / 0.6));
    ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "600 28px sans-serif";
    ctx.fillText("🥇 CÂȘTIGĂTORUL", W / 2, H * 0.32);
    ctx.save(); ctx.translate(W / 2, H * 0.46); ctx.scale(scale, scale);
    ctx.fillStyle = "#fcd34d"; ctx.font = "700 68px Georgia, serif";
    ctx.fillText((results[0] && results[0].name) || "—", 0, 0);
    ctx.restore();
    ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.font = "500 32px sans-serif";
    ctx.fillText(`${(results[0] && results[0].pct) || 0}% ${(results[0] && results[0].title && results[0].title.icon) || ""}`, W / 2, H * 0.56);
  } else if (t >= SCENES.funny[0] && t < SCENES.funny[1]) {
    ctx.fillStyle = "#ffffff"; ctx.font = "700 40px Georgia, serif";
    ctx.fillText("😂 Momente amuzante", W / 2, H * 0.18);
    const list = (highlights && highlights.length) ? highlights : [];
    if (!list.length) {
      ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.font = "26px sans-serif";
      ctx.fillText("(niciun răspuns text de arătat)", W / 2, H * 0.4);
    } else {
      const local = t - SCENES.funny[0];
      const perItem = (SCENES.funny[1] - SCENES.funny[0]) / list.length;
      const idx = Math.min(list.length - 1, Math.floor(local / perItem));
      const itemLocal = local - idx * perItem;
      const scale = easeOutBack(clamp01(itemLocal / 0.4));
      const h = list[idx];
      ctx.save(); ctx.globalAlpha = clamp01(itemLocal / 0.3);
      ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "500 26px sans-serif";
      wrapCenterText(ctx, h.prompt, W / 2, H * 0.36, W * 0.75, 32);
      ctx.save(); ctx.translate(W / 2, H * 0.52); ctx.scale(scale, scale);
      ctx.fillStyle = "#fcd34d"; ctx.font = "italic 700 38px Georgia, serif";
      wrapCenterText(ctx, `"${h.guess}"`, 0, 0, W * 0.8, 46);
      ctx.restore();
      ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.font = "600 28px sans-serif";
      ctx.fillText(`— ${h.name}`, W / 2, H * 0.64);
      ctx.restore();
    }
  } else if (t >= SCENES.awards[0] && t < SCENES.awards[1]) {
    ctx.fillStyle = "#ffffff"; ctx.font = "700 40px Georgia, serif";
    ctx.fillText("🏆 Titluri", W / 2, H * 0.18);
    const local = t - SCENES.awards[0];
    results.slice(0, 5).forEach((r, i) => {
      const rowT = clamp01((local - i * 0.5) / 0.4);
      if (rowT <= 0) return;
      const y = H * 0.28 + i * 90 + (1 - easeOutBack(rowT)) * 40;
      ctx.globalAlpha = rowT;
      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fillRect(W * 0.1, y - 34, W * 0.8, 60);
      ctx.fillStyle = "#fff"; ctx.font = "600 28px sans-serif";
      ctx.fillText(`${r.name}`, W * 0.14, y + 2);
      ctx.fillStyle = "#fcd34d"; ctx.font = "26px sans-serif";
      ctx.textAlign = "right";
      ctx.fillText(`${(r.title && r.title.icon) || ""} ${(r.title && r.title.label) || ""}`, W * 0.86, y + 2);
      ctx.textAlign = "center"; ctx.globalAlpha = 1;
    });
  } else if (t >= SCENES.meter[0] && t < SCENES.meter[1]) {
    ctx.fillStyle = "#ffffff"; ctx.font = "700 40px Georgia, serif";
    ctx.fillText("❤️ Prietenometru", W / 2, H * 0.18);
    const local = t - SCENES.meter[0];
    results.slice(0, 5).forEach((r, i) => {
      const rowT = clamp01((local - i * 0.35) / 0.6);
      const y = H * 0.28 + i * 100;
      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.font = "600 26px sans-serif";
      ctx.fillText(r.name, W * 0.1, y);
      ctx.fillStyle = "rgba(255,255,255,0.1)";
      ctx.fillRect(W * 0.1, y + 14, W * 0.8, 16);
      ctx.fillStyle = "#fcd34d";
      ctx.fillRect(W * 0.1, y + 14, W * 0.8 * (r.pct / 100) * rowT, 16);
      ctx.textAlign = "right"; ctx.fillStyle = "#fcd34d"; ctx.font = "600 24px sans-serif";
      ctx.fillText(`${Math.round(r.pct * rowT)}%`, W * 0.9, y - 2);
      ctx.textAlign = "center";
    });
  } else if (t >= SCENES.outro[0]) {
    if (Math.abs(t - SCENES.outro[0]) < 0.05) spawnConfetti(particles, W, H, 80);
    ctx.fillStyle = "#ffffff"; ctx.font = "700 44px Georgia, serif";
    wrapCenterText(ctx, "Mulțumim că ați jucat", W / 2, H * 0.42, W * 0.8, 54);
    ctx.fillStyle = "#fcd34d"; ctx.font = "700 52px Georgia, serif";
    ctx.fillText("Know Me 🎉", W / 2, H * 0.52);
  }

  updateAndDrawConfetti(ctx, particles, W, H);
}

const RECAP_DURATION = RECAP_SCENES.outro[1];

function RecapVideo({ results, hostName, highlights }) {
  const canvasRef = useRef(null);
  const [state, setState] = useState("idle"); // idle | recording | done | error
  const [progress, setProgress] = useState(0);
  const [videoUrl, setVideoUrl] = useState(null);
  const [mime, setMime] = useState("video/webm");

  function generate() {
    const canvas = canvasRef.current;
    const W = 720, H = 1280;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    let mimeType = "video/mp4";
    if (!(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(mimeType))) {
      mimeType = "video/webm;codecs=vp9";
      if (!(window.MediaRecorder && MediaRecorder.isTypeSupported(mimeType))) mimeType = "video/webm";
    }
    setMime(mimeType);
    if (!window.MediaRecorder || !canvas.captureStream) {
      setState("error"); return;
    }
    setState("recording"); setProgress(0);
    const stream = canvas.captureStream(30);
    let recorder;
    try { recorder = new MediaRecorder(stream, { mimeType }); }
    catch (e) { recorder = new MediaRecorder(stream); }
    const chunks = [];
    recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: mimeType });
      setVideoUrl(URL.createObjectURL(blob));
      setState("done");
    };
    recorder.start();

    const particles = [];
    let startTs = null;
    function loop(ts) {
      if (!startTs) startTs = ts;
      const elapsed = (ts - startTs) / 1000;
      drawRecapFrame(ctx, W, H, elapsed, results, hostName, particles, highlights);
      setProgress(Math.min(100, Math.round((elapsed / RECAP_DURATION) * 100)));
      if (elapsed < RECAP_DURATION) requestAnimationFrame(loop);
      else recorder.stop();
    }
    requestAnimationFrame(loop);
  }

  return (
    <div className="rounded-2xl border border-white/10 bg-white/[0.04] p-4 mt-2 mb-6">
      <p className="text-xs uppercase tracking-widest text-white/40 mb-3">🎬 Videoclip recap (20-25s)</p>
      <canvas ref={canvasRef} style={{ display: "none" }} />
      {state === "idle" && <Primary onClick={generate}>Generează videoclipul</Primary>}
      {state === "recording" && (
        <div>
          <div className="h-1.5 rounded-full bg-white/10 overflow-hidden mb-2">
            <div className="h-full bg-gradient-to-r from-amber-300 to-pink-400 transition-all" style={{ width: `${progress}%` }} />
          </div>
          <p className="text-white/40 text-xs text-center">Se generează... {progress}%</p>
        </div>
      )}
      {state === "done" && videoUrl && (
        <div className="flex flex-col gap-2">
          <video src={videoUrl} controls className="w-full rounded-xl" style={{ maxHeight: 320 }} />
          <a href={videoUrl} download={`know-me-recap.${mime.includes("mp4") ? "mp4" : "webm"}`}>
            <Primary>⬇️ Descarcă videoclipul</Primary>
          </a>
        </div>
      )}
      {state === "error" && (
        <p className="text-rose-300 text-sm">Browserul acesta nu suportă generarea video (MediaRecorder/captureStream indisponibil). Încearcă din Chrome sau o versiune recentă de Safari.</p>
      )}
    </div>
  );
}

function ResultsScreen({ results, hostName, prediction, highlights }) {
  if (!results) return <div className="p-8 text-center text-white/50">Se calculează rezultatele...</div>;
  const medals = ["🥇","🥈","🥉"];
  const actualWinner = results[0]?.name;
  const predictionCorrect = prediction && actualWinner && prediction === actualWinner;
  return (
    <div className="relative min-h-[600px] px-4 py-6">
      <ConfettiBurst />
      <div className="text-center mb-6">
        <h2 className="display text-3xl">Prietenometru</h2>
        <p className="text-white/50 text-sm mt-1">cât de bine te cunosc</p>
      </div>
      {prediction && (
        <div className={`rounded-2xl border p-4 mb-5 text-center pop-anim ${predictionCorrect ? "border-emerald-400/40 bg-emerald-400/10 text-emerald-300" : "border-rose-400/40 bg-rose-400/10 text-rose-300"}`}>
          🔮 Predicția hostului: <b>{prediction}</b> câștigă — {predictionCorrect ? "corect! ✔️" : `greșit, a câștigat ${actualWinner} ✕`}
        </div>
      )}
      <RecapVideo results={results} hostName={hostName} highlights={highlights} />
      {results.map((r,i)=>(
        <div key={r.name} className="podium-anim rounded-2xl border border-white/10 bg-white/[0.04] p-4 mb-3" style={{animationDelay:`${i*150}ms`}}>
          <div className="flex items-center gap-3">
            <span className="display text-lg text-amber-300 w-6 text-center">{medals[i]||`#${i+1}`}</span>
            <div className="flex-1"><p>{r.name}</p><p className="text-xs text-white/40">{r.title?.icon} {r.title?.label}</p></div>
            <p className="display text-2xl text-amber-300">{r.pct}%</p>
          </div>
          <div className="h-1.5 rounded-full bg-white/10 mt-3 overflow-hidden">
            <div className="h-full bg-gradient-to-r from-amber-300 to-pink-400" style={{width:`${r.pct}%`}} />
          </div>
        </div>
      ))}
    </div>
  );
}
